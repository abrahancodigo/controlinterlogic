    <!-- Anti-flash theme bootstrap: aplica el tema guardado antes de pintar CSS -->
    <script>
        (function () {
            try {
                var stored = localStorage.getItem('dalse-theme');
                var mode = stored === 'dark' || stored === 'light' || stored === 'auto' ? stored : 'auto';
                var effective = mode;
                if (mode === 'auto') {
                    effective = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                        ? 'dark' : 'light';
                }
                document.documentElement.setAttribute('data-theme', effective);
                document.documentElement.setAttribute('data-theme-mode', mode);
            } catch (e) {
                document.documentElement.setAttribute('data-theme', 'light');
                document.documentElement.setAttribute('data-theme-mode', 'auto');
            }
        })();
    </script>
